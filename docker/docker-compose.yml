version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../models:/app/models
    restart: unless-stopped

  demo:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ..:/app
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://api:8000
    depends_on:
      - api
    command: >
      bash -c "pip install --quiet streamlit pandas requests &&
               export BACKEND_URL=http://api:8000 &&
               streamlit run demo/app.py --server.address=0.0.0.0"
    restart: unless-stopped
